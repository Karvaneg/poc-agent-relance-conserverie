<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto-start-reverse" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3a4a5a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1600" height="900" fill="#fafbfc"/>

  <!-- ======================= HEADER ======================= -->
  <rect x="0" y="0" width="1600" height="104" fill="#1f3a52"/>
  <text x="48" y="50" fill="#ffffff" font-size="30" font-weight="700">Automatisation finance — Forward Deployed Engineer</text>
  <text x="48" y="82" fill="#aecbe4" font-size="17">L'agent propose · le comptable dispose — deux flux, un SI existant (Odoo / OpenProd)</text>

  <!-- legend -->
  <g font-size="13" fill="#ffffff">
    <rect x="1010" y="26" width="16" height="16" rx="3" fill="#dbe7f3" stroke="#2f6db0" stroke-width="1.5"/>
    <text x="1032" y="39">SI existant</text>
    <rect x="1130" y="26" width="16" height="16" rx="3" fill="#d8f0e0" stroke="#1f9d57" stroke-width="1.5"/>
    <text x="1152" y="39">Agents (greenfield)</text>
    <rect x="1310" y="26" width="16" height="16" rx="3" fill="#ece0f6" stroke="#7a3fb0" stroke-width="1.5"/>
    <text x="1332" y="39">Claude</text>
    <rect x="1010" y="58" width="16" height="16" rx="3" fill="#fdeccf" stroke="#d98c1f" stroke-width="1.5"/>
    <text x="1032" y="71">Entrées (mail / PDP)</text>
    <rect x="1200" y="58" width="16" height="16" rx="3" fill="#fbdcec" stroke="#c0398a" stroke-width="1.5"/>
    <text x="1222" y="71">Contrôle humain</text>
  </g>

  <!-- lane labels -->
  <text x="48" y="166" fill="#2f6db0" font-size="16" font-weight="700">FLUX 1 · RELANCES CLIENTS</text>
  <text x="48" y="481" fill="#d98c1f" font-size="16" font-weight="700">FLUX 2 · CAPTURE FACTURES FOURNISSEURS</text>
  <line x1="48" y1="312" x2="1552" y2="312" stroke="#e1e6ea" stroke-width="2"/>

  <!-- ======================= ARROWS (under boxes) ======================= -->
  <g stroke="#3a4a5a" stroke-width="2.5" fill="none">
    <!-- lane A -->
    <line x1="290" y1="240" x2="372" y2="240" marker-end="url(#arrow)"/>
    <line x1="630" y1="240" x2="1012" y2="240" marker-end="url(#arrow)"/>
    <line x1="505" y1="295" x2="730" y2="338" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="1270" y1="240" x2="1338" y2="364" marker-end="url(#arrow)"/>
    <!-- lane B -->
    <line x1="290" y1="555" x2="372" y2="555" marker-end="url(#arrow)"/>
    <line x1="630" y1="555" x2="1012" y2="555" marker-end="url(#arrow)"/>
    <line x1="505" y1="500" x2="730" y2="455" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="1270" y1="555" x2="1338" y2="476" marker-end="url(#arrow)"/>
  </g>
  <!-- arrow labels -->
  <g font-size="13" fill="#5a6b7a" font-style="italic" text-anchor="middle">
    <text x="820" y="230">écrit le brouillon dans Odoo</text>
    <text x="820" y="545">écrit le brouillon dans Odoo</text>
    <text x="1312" y="300">valide</text>
    <text x="1312" y="520">valide</text>
  </g>

  <!-- ======================= BOXES ======================= -->
  <!-- A1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="185" width="230" height="110" rx="11" fill="#dbe7f3" stroke="#2f6db0" stroke-width="2.5"/>
  </g>
  <text x="175" y="216" text-anchor="middle" font-size="18" font-weight="700" fill="#1f3a52">ODOO / OpenProd</text>
  <text x="175" y="240" text-anchor="middle" font-size="13.5" fill="#33485c">Factures impayées</text>
  <text x="175" y="259" text-anchor="middle" font-size="13.5" fill="#33485c">échues — lecture seule</text>

  <!-- A2 -->
  <g filter="url(#shadow)">
    <rect x="380" y="185" width="250" height="110" rx="11" fill="#d8f0e0" stroke="#1f9d57" stroke-width="2.5"/>
  </g>
  <text x="505" y="216" text-anchor="middle" font-size="18" font-weight="700" fill="#14613a">AGENT RELANCES</text>
  <text x="505" y="240" text-anchor="middle" font-size="13.5" fill="#1d6e44">Classe J+7 / J+15 / J+30</text>
  <text x="505" y="259" text-anchor="middle" font-size="13.5" fill="#1d6e44">logique pure testée</text>

  <!-- A3 -->
  <g filter="url(#shadow)">
    <rect x="1020" y="185" width="250" height="110" rx="11" fill="#fff6cc" stroke="#c9a92a" stroke-width="2.5"/>
  </g>
  <text x="1145" y="216" text-anchor="middle" font-size="18" font-weight="700" fill="#7a6310">Brouillon relance</text>
  <text x="1145" y="240" text-anchor="middle" font-size="13.5" fill="#7a6310">+ activité « à valider »</text>
  <text x="1145" y="259" text-anchor="middle" font-size="13.5" fill="#7a6310">dans Odoo</text>

  <!-- B1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="500" width="230" height="110" rx="11" fill="#fdeccf" stroke="#d98c1f" stroke-width="2.5"/>
  </g>
  <text x="175" y="531" text-anchor="middle" font-size="18" font-weight="700" fill="#8a5610">Mail factures@</text>
  <text x="175" y="555" text-anchor="middle" font-size="13.5" fill="#8a5610">PDP — XML structuré</text>
  <text x="175" y="574" text-anchor="middle" font-size="13.5" fill="#8a5610">PDF / scan</text>

  <!-- B2 -->
  <g filter="url(#shadow)">
    <rect x="380" y="500" width="250" height="110" rx="11" fill="#d8f0e0" stroke="#1f9d57" stroke-width="2.5"/>
  </g>
  <text x="505" y="531" text-anchor="middle" font-size="18" font-weight="700" fill="#14613a">AGENT CAPTURE</text>
  <text x="505" y="555" text-anchor="middle" font-size="13.5" fill="#1d6e44">Parsing XML | OCR + LLM</text>
  <text x="505" y="574" text-anchor="middle" font-size="13.5" fill="#1d6e44">normalise · 3-way match</text>

  <!-- B3 -->
  <g filter="url(#shadow)">
    <rect x="1020" y="500" width="250" height="110" rx="11" fill="#fff6cc" stroke="#c9a92a" stroke-width="2.5"/>
  </g>
  <text x="1145" y="531" text-anchor="middle" font-size="18" font-weight="700" fill="#7a6310">Brouillon facture</text>
  <text x="1145" y="555" text-anchor="middle" font-size="13.5" fill="#7a6310">fournisseur · score conf.</text>
  <text x="1145" y="574" text-anchor="middle" font-size="13.5" fill="#7a6310">dans Odoo</text>

  <!-- Claude (shared) -->
  <g filter="url(#shadow)">
    <rect x="690" y="330" width="200" height="130" rx="11" fill="#ece0f6" stroke="#7a3fb0" stroke-width="2.5"/>
  </g>
  <text x="790" y="378" text-anchor="middle" font-size="18" font-weight="700" fill="#542a7e">API CLAUDE</text>
  <text x="790" y="403" text-anchor="middle" font-size="13.5" fill="#5e3389">Génération</text>
  <text x="790" y="423" text-anchor="middle" font-size="13.5" fill="#5e3389">&amp; extraction</text>

  <!-- Human control (shared) -->
  <g filter="url(#shadow)">
    <rect x="1330" y="330" width="210" height="180" rx="11" fill="#fbdcec" stroke="#c0398a" stroke-width="2.5"/>
  </g>
  <!-- person glyph -->
  <circle cx="1435" cy="372" r="13" fill="none" stroke="#a82d77" stroke-width="2.5"/>
  <path d="M1414 402 a21 18 0 0 1 42 0" fill="none" stroke="#a82d77" stroke-width="2.5"/>
  <text x="1435" y="442" text-anchor="middle" font-size="18" font-weight="700" fill="#90276a">COMPTABLES</text>
  <text x="1435" y="466" text-anchor="middle" font-size="13.5" fill="#90276a">relisent &amp; valident</text>
  <text x="1435" y="486" text-anchor="middle" font-size="13.5" fill="#90276a">contrôle humain</text>

  <!-- ======================= FOOTER ======================= -->
  <rect x="0" y="812" width="1600" height="88" fill="#eef2f5"/>
  <text x="48" y="848" font-size="16" font-weight="700" fill="#1f3a52">Où ça tourne — worker planifié / événementiel · n8n + Python</text>
  <text x="48" y="876" font-size="14.5" fill="#33485c">Odoo auto-hébergé → conteneur sidecar (cron)   ·   Odoo SaaS → worker externe via API   ·   variante : action planifiée Odoo   ·   relances = pas de temps réel</text>
</svg>
